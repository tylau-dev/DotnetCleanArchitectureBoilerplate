# Local development PostgreSQL instance.
# - EF Core (Infrastructure) uses the default "public" schema for relational Order data.
# - Marten event store uses the "event_store" schema (configured in Infrastructure DI).
#
# Credentials are NOT hardcoded here. Copy ".env.example" to ".env" (gitignored) and adjust
# as needed; docker-compose loads ".env" automatically. The values must match
# src/API/appsettings.Development.json's ConnectionStrings:Database (also gitignored).
# Production must override via environment variables / a secrets manager, not this file.
services:
  postgres:
    image: postgres:17
    container_name: dotnet-clean-boilerplate-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
